# CONFIGURAÇĂO DO BANCO (Localhost)
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_industrial?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CONFIGURAÇĂO DO JPA/HIBERNATE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# CONFIGURAÇĂO DO FLYWAY (Gerenciador de Migraçőes)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# SEGURANÇA (Chave secreta para gerar Tokens - altere em produçăo)
api.security.token.secret=minha-chave-secreta-super-segura-123